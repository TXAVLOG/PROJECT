name: Update Winget

on:
  release:
    types: [published]

jobs:
  update-winget:
    runs-on: windows-latest

    steps:
      - name: Install wingetcreate
        run: winget install wingetcreate --accept-source-agreements --accept-package-agreements

      - name: Update winget manifest
        run: |
          wingetcreate update TXA.CCB `
            --urls https://github.com/TXAVLOG/PROJECT/releases/download/${{ github.event.release.tag_name }}/CocCocBeta.exe `
            --version ${{ github.event.release.tag_name }} `
            --token ${{ secrets.WINGET_CREATE_PAT }} `
            --submit
